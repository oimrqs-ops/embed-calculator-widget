<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Embed Calculator Widget</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050806;
        color: #e8f7ee;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
      }

      h1 {
        font-size: 28px;
        margin: 0 0 16px;
      }

      .ops-calculator {
        border: 1px solid #1e6f3c;
        border-radius: 8px;
        padding: 20px;
        display: grid;
        gap: 16px;
        background: #07100b;
      }

      label {
        display: grid;
        gap: 8px;
      }

      input {
        font: inherit;
        border: 1px solid #315b42;
        border-radius: 6px;
        background: #020503;
        color: inherit;
        padding: 10px;
      }

      .ops-calculator__check {
        grid-template-columns: auto 1fr;
        align-items: center;
      }

      .ops-calculator__result {
        font-size: 20px;
        color: #66ff99;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Estimate</h1>
      <div data-ops-calculator></div>
    </main>
    <script type="module" src="./calculator.js"></script>
  </body>
</html>
